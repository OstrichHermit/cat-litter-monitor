<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>猫厕所监控</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --primary-light: #34495e;
            --success: #27ae60;
            --success-light: #2ecc71;
            --danger: #c0392b;
            --danger-light: #e74c3c;
            --warning: #f39c12;
            --info: #3498db;
            --gray-50: #f9fafb;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-400: #ced4da;
            --gray-600: #6c757d;
            --gray-800: #343a40;
            --gray-900: #212529;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.15);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --header-height: 56px;
            --nav-height: 60px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
            background: var(--gray-100);
            line-height: 1.6;
            color: var(--gray-900);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ==================== Mobile App Container ==================== */
        .mobile-app {
            display: flex;
            flex-direction: column;
            height: 100%;
            height: 100dvh;
            overflow: hidden;
        }

        /* ==================== Header ==================== */
        .mobile-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 0 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-md);
            z-index: 100;
            height: var(--header-height);
            flex-shrink: 0;
            position: relative;
        }

        .mobile-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-logo h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .header-btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: var(--radius-xs);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(10px);
        }

        .header-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.25);
        }

        .notification-icon {
            position: relative;
            padding: 8px 12px;
        }

        .notification-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            background: linear-gradient(135deg, #ff4757, #ff6b7a);
            color: white;
            font-size: 10px;
            font-weight: 700;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            box-shadow: 0 2px 8px rgba(255, 71, 87, 0.4);
            animation: badgePop 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .notification-badge.hidden {
            display: none;
        }

        @keyframes badgePop {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* ==================== Tab Content ==================== */
        .tab-content {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .tab-panel {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .tab-panel.active {
            opacity: 1;
            visibility: visible;
        }

        /* ==================== Monitor Tab ==================== */
        .monitor-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .video-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #1a1a1a 0%, #000 100%);
        }

        .video-feed {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .status-overlay {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--danger);
            animation: pulse 2s infinite;
        }

        .status-dot.running {
            background: var(--success);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        .monitor-controls {
            padding: 16px;
            display: flex;
            gap: 12px;
            background: var(--gray-100);
        }

        .control-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: var(--shadow);
        }

        .btn-stop {
            background: linear-gradient(135deg, var(--danger), var(--danger-light));
            color: white;
        }

        .btn-stop:active {
            transform: scale(0.97);
            box-shadow: var(--shadow-md);
        }

        .btn-restart {
            background: linear-gradient(135deg, #2980b9, #3498db);
            color: white;
        }

        .btn-restart:active {
            transform: scale(0.97);
            box-shadow: var(--shadow-md);
        }

        .control-btn:disabled {
            background: var(--gray-400);
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ==================== Stats Tab ==================== */
        .stats-container {
            padding: 16px;
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
        }

        .stats-section {
            margin-bottom: 20px;
        }

        .stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            cursor: pointer;
            padding: 12px 16px;
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .stats-header:active {
            transform: scale(0.98);
        }

        .stats-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--gray-900);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-toggle {
            font-size: 18px;
            transition: transform 0.3s ease;
            color: var(--gray-600);
        }

        .stats-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .cat-card {
            background: white;
            border-radius: var(--radius);
            padding: 18px;
            box-shadow: var(--shadow);
            text-align: center;
            transition: var(--transition);
        }

        .cat-card:active {
            transform: scale(0.97);
        }

        .cat-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 8px;
        }

        .cat-count {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--success), var(--success-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .cat-label {
            font-size: 13px;
            color: var(--gray-600);
            margin-top: 4px;
        }

        .stats-content {
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stats-content.collapsed {
            max-height: 0;
        }

        /* ==================== Records Tab ==================== */
        .records-container {
            padding: 16px;
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
            min-height: 100%;
        }

        .records-date-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--gray-200), var(--gray-300));
            border-radius: var(--radius-sm);
        }

        .records-date {
            font-size: 15px;
            font-weight: 600;
            color: var(--gray-800);
        }

        .records-actions {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toggle-label {
            font-size: 16px;
        }

        .toggle-switch {
            width: 46px;
            height: 26px;
            background: var(--gray-400);
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .toggle-switch.active {
            background: var(--success);
        }

        .toggle-switch.delete-active {
            background: var(--danger);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .toggle-switch.active::after,
        .toggle-switch.delete-active::after {
            transform: translateX(20px);
        }

        .record-item {
            background: white;
            border-radius: var(--radius);
            padding: 12px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .record-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, var(--success), var(--success-light));
        }

        .record-item:active {
            transform: scale(0.98);
        }

        .record-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            min-width: 55px;
            text-align: center;
        }

        .record-time {
            font-family: "SF Mono", "Monaco", "Consolas", monospace;
            font-size: 12px;
            color: var(--gray-600);
            font-weight: 500;
            text-align: center;
        }

        .record-cat {
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-900);
            text-align: center;
        }

        .record-thumb {
            width: 70px;
            height: 44px;
            object-fit: cover;
            border-radius: var(--radius-xs);
            background: var(--gray-200);
        }

        .edit-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0;
            transform: translateX(-10px);
            pointer-events: none;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .record-item.show-edit .edit-controls {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .cat-select {
            padding: 4px 8px;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-xs);
            font-size: 12px;
            background: white;
            color: var(--gray-900);
        }

        .confirm-btn {
            background: linear-gradient(135deg, var(--success), var(--success-light));
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: var(--radius-xs);
            font-size: 11px;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(39, 174, 96, 0.3);
        }

        .delete-btn {
            background: linear-gradient(135deg, var(--danger), var(--danger-light));
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.4);
        }

        .record-item.show-delete .delete-btn {
            opacity: 1;
            pointer-events: auto;
        }

        .record-item.show-delete {
            padding-right: 50px;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--gray-600);
        }

        .empty-state-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }

        /* ==================== Bottom Navigation ==================== */
        .bottom-nav {
            display: flex;
            background: white;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
            flex-shrink: 0;
        }

        .nav-item {
            flex: 1;
            padding: 8px 0;
            border: none;
            background: none;
            color: var(--gray-600);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-height: calc(var(--nav-height) - env(safe-area-inset-bottom));
        }

        .nav-item:active {
            transform: scale(0.92);
        }

        .nav-icon {
            font-size: 26px;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item.active .nav-icon {
            transform: scale(1.1);
        }

        /* ==================== Modal ==================== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: flex-end;
            justify-content: center;
            animation: fadeIn 0.25s ease-out;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            border-radius: var(--radius) var(--radius) 0 0;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-height: 85vh;
            overflow: hidden;
            animation: slideUp 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .modal-title {
            font-size: 17px;
            font-weight: 600;
        }

        .modal-toggles {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .modal-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-body {
            max-height: calc(85vh - 60px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* ==================== Notification List ==================== */
        .notification-list {
            padding: 12px;
        }

        .notification-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            position: relative;
            transition: var(--transition);
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 12px;
            overflow: hidden;
        }

        .notification-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, var(--warning), #f39c12);
        }

        .notification-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            min-width: 55px;
            text-align: center;
        }

        .notification-time {
            font-family: "SF Mono", "Monaco", "Consolas", monospace;
            font-size: 11px;
            color: var(--gray-600);
            font-weight: 500;
            text-align: center;
        }

        .notification-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--gray-900);
            text-align: center;
        }

        .notification-img {
            width: 70px;
            height: 44px;
            object-fit: cover;
            border-radius: var(--radius-xs);
            background: var(--gray-200);
        }

        .notification-item .edit-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0;
            transform: translateX(-10px);
            pointer-events: none;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .notification-item.show-edit .edit-controls {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .notification-item .cat-select {
            padding: 4px 8px;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-xs);
            font-size: 12px;
            background: white;
            color: var(--gray-900);
        }

        .notification-item .confirm-btn {
            background: linear-gradient(135deg, var(--success), var(--success-light));
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: var(--radius-xs);
            font-size: 11px;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(39, 174, 96, 0.3);
        }

        .notification-item .delete-btn {
            background: linear-gradient(135deg, var(--danger), var(--danger-light));
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%) scale(0.8);
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.4);
        }

        .notification-item.show-delete .delete-btn {
            opacity: 1;
            transform: translateY(-50%) scale(1);
            pointer-events: auto;
        }

        .notification-item.show-delete {
            padding-right: 50px;
        }

        .notification-empty {
            padding: 60px 20px;
            text-align: center;
            color: var(--gray-600);
        }

        .notification-empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        /* ==================== Loading ==================== */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px;
        }

        .loading-spinner {
            width: 44px;
            height: 44px;
            border: 4px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ==================== Ripple Effect ==================== */
        .ripple {
            position: relative;
            overflow: hidden;
        }

        .ripple::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        .ripple:active::after {
            width: 300px;
            height: 300px;
        }
    </style>
</head>
<body>
    <div class="mobile-app">
        <!-- Header -->
        <header class="mobile-header">
            <div class="header-logo">
                <h1>🐱 猫厕所监控</h1>
            </div>
            <div class="header-actions">
                <button class="header-btn notification-icon" id="notificationBtn">
                    🔔 通知
                    <span class="notification-badge hidden" id="notificationBadge">0</span>
                </button>
            </div>
        </header>

        <!-- Tab Content -->
        <main class="tab-content">
            <!-- Monitor Tab -->
            <div class="tab-panel active" id="tab-monitor">
                <div class="monitor-container">
                    <div class="video-wrapper">
                        <img src="/video_feed" class="video-feed" id="videoFeed" alt="监控画面">
                        <div class="status-overlay">
                            <span class="status-dot" id="statusDot"></span>
                            <span id="statusText">加载中...</span>
                        </div>
                    </div>
                    <div class="monitor-controls">
                        <button class="control-btn btn-stop ripple" id="stopBtn">
                            🛑 停止
                        </button>
                        <button class="control-btn btn-restart ripple" id="restartBtn">
                            🔄 重启
                        </button>
                    </div>
                </div>
            </div>

            <!-- Stats Tab -->
            <div class="tab-panel" id="tab-stats">
                <div class="stats-container">
                    <div class="stats-section">
                        <div class="stats-header" onclick="toggleStats('today')">
                            <span class="stats-title">📅 今日统计</span>
                            <span class="stats-toggle" id="todayToggle">▼</span>
                        </div>
                        <div class="stats-content" id="todayStats">
                            <div class="stats-grid">
                                <div class="cat-card">
                                    <div class="cat-name">小巫</div>
                                    <div class="cat-count" id="today-小巫">0</div>
                                    <div class="cat-label">次</div>
                                </div>
                                <div class="cat-card">
                                    <div class="cat-name">猪猪</div>
                                    <div class="cat-count" id="today-猪猪">0</div>
                                    <div class="cat-label">次</div>
                                </div>
                                <div class="cat-card">
                                    <div class="cat-name">汪三</div>
                                    <div class="cat-count" id="today-汪三">0</div>
                                    <div class="cat-label">次</div>
                                </div>
                                <div class="cat-card">
                                    <div class="cat-name">猪妞</div>
                                    <div class="cat-count" id="today-猪妞">0</div>
                                    <div class="cat-label">次</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="stats-section">
                        <div class="stats-header" onclick="toggleStats('yesterday')">
                            <span class="stats-title">📆 昨日统计</span>
                            <span class="stats-toggle collapsed" id="yesterdayToggle">▼</span>
                        </div>
                        <div class="stats-content collapsed" id="yesterdayStats">
                            <div class="stats-grid">
                                <div class="cat-card">
                                    <div class="cat-name">小巫</div>
                                    <div class="cat-count" id="yesterday-小巫">0</div>
                                    <div class="cat-label">次</div>
                                </div>
                                <div class="cat-card">
                                    <div class="cat-name">猪猪</div>
                                    <div class="cat-count" id="yesterday-猪猪">0</div>
                                    <div class="cat-label">次</div>
                                </div>
                                <div class="cat-card">
                                    <div class="cat-name">汪三</div>
                                    <div class="cat-count" id="yesterday-汪三">0</div>
                                    <div class="cat-label">次</div>
                                </div>
                                <div class="cat-card">
                                    <div class="cat-name">猪妞</div>
                                    <div class="cat-count" id="yesterday-猪妞">0</div>
                                    <div class="cat-label">次</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Records Tab -->
            <div class="tab-panel" id="tab-records">
                <div class="records-container">
                    <div class="records-date-header">
                        <span class="records-date">📅 今日记录</span>
                        <div class="records-actions">
                            <div class="toggle-container">
                                <span class="toggle-label">✏️</span>
                                <div class="toggle-switch" id="todayEditToggle" onclick="toggleEditMode('today')"></div>
                            </div>
                            <div class="toggle-container">
                                <span class="toggle-label">🗑️</span>
                                <div class="toggle-switch" id="todayDeleteToggle" onclick="toggleDeleteMode('today')"></div>
                            </div>
                        </div>
                    </div>
                    <div id="todayRecords"></div>

                    <div class="records-date-header" style="margin-top: 24px;">
                        <span class="records-date">📆 昨日记录</span>
                        <div class="records-actions">
                            <div class="toggle-container">
                                <span class="toggle-label">✏️</span>
                                <div class="toggle-switch" id="yesterdayEditToggle" onclick="toggleEditMode('yesterday')"></div>
                            </div>
                            <div class="toggle-container">
                                <span class="toggle-label">🗑️</span>
                                <div class="toggle-switch" id="yesterdayDeleteToggle" onclick="toggleDeleteMode('yesterday')"></div>
                            </div>
                        </div>
                    </div>
                    <div id="yesterdayRecords"></div>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-tab="monitor">
                <span class="nav-icon">📹</span>
                <span>监控</span>
            </button>
            <button class="nav-item" data-tab="stats">
                <span class="nav-icon">📊</span>
                <span>统计</span>
            </button>
            <button class="nav-item" data-tab="records">
                <span class="nav-icon">🏠</span>
                <span>记录</span>
            </button>
        </nav>
    </div>

    <!-- Notification Modal -->
    <div class="modal-overlay" id="notificationModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">🔔 待识别照片</span>
                <div class="modal-toggles">
                    <div class="toggle-container">
                        <span class="toggle-label">✏️</span>
                        <div class="toggle-switch" id="notificationEditToggle" onclick="toggleEditMode('notification')"></div>
                    </div>
                    <div class="toggle-container">
                        <span class="toggle-label">🗑️</span>
                        <div class="toggle-switch" id="notificationDeleteToggle" onclick="toggleDeleteMode('notification')"></div>
                    </div>
                </div>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <div class="modal-body">
                <div id="notificationContent"></div>
            </div>
        </div>
    </div>

    <script>
        // ==================== Global State ====================
        let socket = null;
        let notificationCount = 0;
        let unreadNotifications = false;
        let todayRecordsData = [];
        let yesterdayRecordsData = [];
        window.currentNotificationPhotos = [];

        // 编辑和删除模式状态
        const editMode = {
            today: false,
            yesterday: false,
            notification: false
        };

        const deleteMode = {
            today: false,
            yesterday: false,
            notification: false
        };

        // ==================== Tab Navigation ====================
        const navItems = document.querySelectorAll('.nav-item');
        const tabPanels = document.querySelectorAll('.tab-panel');

        navItems.forEach(item => {
            item.addEventListener('click', () => {
                const tabId = item.dataset.tab;

                // Update nav items
                navItems.forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');

                // Update tab panels
                tabPanels.forEach(panel => panel.classList.remove('active'));
                document.getElementById(`tab-${tabId}`).classList.add('active');

                // Load video only when monitor tab is active
                const videoFeed = document.getElementById('videoFeed');
                if (tabId === 'monitor') {
                    videoFeed.src = '/video_feed?' + Date.now();
                } else {
                    videoFeed.src = '';
                }
            });
        });

        // ==================== Stats Toggle ====================
        function toggleStats(type) {
            const content = document.getElementById(`${type}Stats`);
            const toggle = document.getElementById(`${type}Toggle`);

            content.classList.toggle('collapsed');
            toggle.classList.toggle('collapsed');
        }

        // ==================== Socket.IO Connection ====================
        function connectSocket() {
            socket = io();

            socket.on('connect', () => {
                console.log('Socket connected');
            });

            socket.on('status_update', (data) => {
                updateStatus(data.running);
            });

            socket.on('records_update', (data) => {
                updateRecords(data);
            });

            socket.on('new_notification', (data) => {
                notificationCount++;
                unreadNotifications = true;
                updateNotificationBadge();
                loadNotifications();
            });

            socket.on('disconnect', () => {
                console.log('Socket disconnected');
            });
        }

        // ==================== Status Update ====================
        function updateStatus(running) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const stopBtn = document.getElementById('stopBtn');
            const restartBtn = document.getElementById('restartBtn');

            if (running) {
                statusDot.classList.add('running');
                statusText.textContent = '运行中';
                stopBtn.disabled = false;
                restartBtn.disabled = false;
            } else {
                statusDot.classList.remove('running');
                statusText.textContent = '已停止';
                stopBtn.disabled = true;
                restartBtn.disabled = true;
            }
        }

        // ==================== Records Update ====================
        function updateRecords(data) {
            const todayContainer = document.getElementById('todayRecords');
            const yesterdayContainer = document.getElementById('yesterdayRecords');

            // 保存记录数据到全局变量
            todayRecordsData = data.today || [];
            yesterdayRecordsData = data.yesterday || [];

            // 计算统计数据
            const cats = ['小巫', '猪猪', '汪三', '猪妞'];
            const todayCounts = {};
            const yesterdayCounts = {};

            cats.forEach(cat => {
                todayCounts[cat] = todayRecordsData.filter(r => r.cat_name === cat).length;
                yesterdayCounts[cat] = yesterdayRecordsData.filter(r => r.cat_name === cat).length;
            });

            // 更新统计显示
            cats.forEach(cat => {
                const todayEl = document.getElementById(`today-${cat}`);
                const yesterdayEl = document.getElementById(`yesterday-${cat}`);
                if (todayEl) todayEl.textContent = todayCounts[cat];
                if (yesterdayEl) yesterdayEl.textContent = yesterdayCounts[cat];
            });

            // Update today records
            if (todayRecordsData.length > 0) {
                todayContainer.innerHTML = todayRecordsData.map(r => createRecordItem(r, 'today')).join('');
            } else {
                todayContainer.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div>今日暂无记录</div>';
            }

            // Update yesterday records
            if (yesterdayRecordsData.length > 0) {
                yesterdayContainer.innerHTML = yesterdayRecordsData.map(r => createRecordItem(r, 'yesterday')).join('');
            } else {
                yesterdayContainer.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div>昨日暂无记录</div>';
            }

            // 更新显示状态
            updateRecordItemsDisplay('today');
            updateRecordItemsDisplay('yesterday');
        }

        function createRecordItem(record, section) {
            const photoPath = record.photo_path.replace(/^photo\//, '');
            const photoUrl = `/static/photo/${photoPath}`;
            return `
                <div class="record-item" data-record-id="${record.id}" data-section="${section}">
                    <div class="record-info">
                        <span class="record-time">${record.record_time}</span>
                        <span class="record-cat">${record.cat_name}</span>
                    </div>
                    <img src="${photoUrl}" class="record-thumb" alt="照片" onclick="viewImage('${photoUrl}', event)">

                    <!-- Edit Controls -->
                    <div class="edit-controls">
                        <select class="cat-select" id="cat-select-${record.id}">
                            <option value="">选择</option>
                            <option value="小巫">小巫</option>
                            <option value="猪猪">猪猪</option>
                            <option value="汪三">汪三</option>
                            <option value="猪妞">猪妞</option>
                        </select>
                        <button class="confirm-btn" onclick="editRecord(${record.id}, '${section}', event)">确认</button>
                    </div>

                    <!-- Delete Button -->
                    <button class="delete-btn" onclick="deleteRecord(${record.id}, '${section}', event)">✕</button>
                </div>
            `;
        }

        function viewImage(url, event) {
            if (event) event.stopPropagation();
            window.open(url, '_blank');
        }

        // ==================== Record Actions ====================

        // 切换编辑模式
        function toggleEditMode(section) {
            editMode[section] = !editMode[section];
            const toggleEl = document.getElementById(`${section}EditToggle`);
            toggleEl.classList.toggle('active', editMode[section]);

            if (section === 'notification') {
                updateNotificationItemsDisplay();
            } else {
                updateRecordItemsDisplay(section);
            }
        }

        // 切换删除模式
        function toggleDeleteMode(section) {
            deleteMode[section] = !deleteMode[section];
            const toggleEl = document.getElementById(`${section}DeleteToggle`);
            toggleEl.classList.toggle('active', deleteMode[section]);
            toggleEl.classList.toggle('delete-active', deleteMode[section]);

            if (section === 'notification') {
                updateNotificationItemsDisplay();
            } else {
                updateRecordItemsDisplay(section);
            }
        }

        // 更新记录项显示状态
        function updateRecordItemsDisplay(section) {
            const container = document.getElementById(`${section}Records`);
            const items = container.querySelectorAll('.record-item');

            items.forEach(item => {
                item.classList.toggle('show-edit', editMode[section]);
                item.classList.toggle('show-delete', deleteMode[section]);
            });
        }

        // 更新通知项显示状态
        function updateNotificationItemsDisplay() {
            const container = document.getElementById('notificationContent');
            const items = container.querySelectorAll('.notification-item');

            items.forEach(item => {
                item.classList.toggle('show-edit', editMode.notification);
                item.classList.toggle('show-delete', deleteMode.notification);
            });
        }

        // 编辑记录
        async function editRecord(recordId, section, event) {
            event.stopPropagation();

            const newCatName = document.getElementById(`cat-select-${recordId}`).value;

            if (!newCatName) {
                alert('请选择猫咪');
                return;
            }

            try {
                const response = await fetch(`/api/records/edit/${recordId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cat_name: newCatName })
                });

                const data = await response.json();

                if (data.success) {
                    loadRecords();
                } else {
                    alert('修改失败：' + data.error);
                }
            } catch (err) {
                alert('请求失败：' + err);
            }
        }

        // 删除记录
        async function deleteRecord(recordId, section, event) {
            event.stopPropagation();

            if (!confirm('确定要删除这条记录吗？')) return;

            try {
                const response = await fetch(`/api/records/delete/${recordId}`, {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (data.success) {
                    loadRecords();
                } else {
                    alert('删除失败：' + data.error);
                }
            } catch (err) {
                alert('请求失败：' + err);
            }
        }

        // 手动添加记录（将未识别照片入库）
        async function manualAddRecord(photoRelPath, event) {
            if (event) event.stopPropagation();

            const catSelect = document.getElementById(`notify-cat-${photoRelPath.split('/').pop()}`);
            if (!catSelect) {
                alert('未找到选择框');
                return;
            }

            const catName = catSelect.value;
            if (!catName) {
                alert('请选择猫咪');
                return;
            }

            try {
                const response = await fetch('/api/records/manual-add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        photo_path: photoRelPath,
                        cat_name: catName
                    })
                });

                const data = await response.json();

                if (data.success) {
                    loadNotifications();
                    loadRecords();
                } else {
                    alert('添加失败：' + data.error);
                }
            } catch (err) {
                alert('请求失败：' + err);
            }
        }

        // 删除未识别照片
        async function deleteUnidentifiedPhoto(photoRelPath, event) {
            if (event) event.stopPropagation();

            if (!confirm('确定要删除这张照片吗？')) return;

            try {
                const response = await fetch('/api/records/unidentified/delete', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ photo_path: photoRelPath })
                });

                const data = await response.json();

                if (data.success) {
                    loadNotifications();
                } else {
                    alert('删除失败：' + data.error);
                }
            } catch (err) {
                alert('请求失败：' + err);
            }
        }

        // ==================== Load Records ====================
        function loadRecords() {
            fetch('/api/records/today?t=' + Date.now())
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        updateRecords(data);
                    }
                })
                .catch(err => console.error('Failed to load records:', err));
        }

        // ==================== Control Buttons ====================
        document.getElementById('stopBtn').addEventListener('click', function() {
            if (!confirm('确定要停止系统服务吗？')) return;

            this.disabled = true;
            this.textContent = '⏳ 停止中...';

            fetch('/api/stop', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'stopping') {
                        alert('系统正在停止，请稍候...');
                        setTimeout(() => window.location.reload(), 3000);
                    } else {
                        alert('停止失败: ' + data.message);
                        this.disabled = false;
                        this.textContent = '🛑 停止';
                    }
                })
                .catch(err => {
                    alert('请求失败: ' + err);
                    this.disabled = false;
                    this.textContent = '🛑 停止';
                });
        });

        document.getElementById('restartBtn').addEventListener('click', function() {
            if (!confirm('确定要重启系统服务吗？')) return;

            this.disabled = true;
            this.textContent = '⏳ 重启中...';

            fetch('/api/restart', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'restarting') {
                        alert('系统正在重启，请稍候...');
                        setTimeout(() => window.location.reload(), 5000);
                    } else {
                        alert('重启失败: ' + data.message);
                        this.disabled = false;
                        this.textContent = '🔄 重启';
                    }
                })
                .catch(err => {
                    alert('请求失败: ' + err);
                    this.disabled = false;
                    this.textContent = '🔄 重启';
                });
        });

        // ==================== Notifications ====================
        function updateNotificationBadge() {
            const badge = document.getElementById('notificationBadge');
            if (notificationCount > 0 && unreadNotifications) {
                badge.textContent = notificationCount > 99 ? '99+' : notificationCount;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function loadNotifications() {
            fetch('/api/records/unidentified?t=' + Date.now())
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        notificationCount = data.count;
                        updateNotificationBadge();
                        window.currentNotificationPhotos = data.photos;
                        renderNotifications(data.photos);
                    }
                })
                .catch(err => console.error('Failed to load notifications:', err));
        }

        function renderNotifications(photos) {
            const content = document.getElementById('notificationContent');

            if (!photos || photos.length === 0) {
                content.innerHTML = `
                    <div class="notification-empty">
                        <div class="notification-empty-icon">🎉</div>
                        <p>所有照片都已识别完毕</p>
                    </div>
                `;
                return;
            }

            const sortedPhotos = [...photos].sort((a, b) => {
                return b.filename.localeCompare(a.filename);
            });

            content.innerHTML = `
                <div class="notification-list">
                    ${sortedPhotos.map(photo => {
                        let relativePath = '';
                        const parts = photo.path.split(/[/\\]/);
                        const photoIndex = parts.indexOf('photo');
                        if (photoIndex !== -1 && photoIndex + 3 < parts.length) {
                            const date = parts[photoIndex + 1];
                            const unidentified = parts[photoIndex + 2];
                            const filename = parts[photoIndex + 3];
                            relativePath = `${date}/${unidentified}/${filename}`;
                        }
                        const photoUrl = `/static/photo/${relativePath}`;
                        const timeMatch = photo.filename.match(/_(\d{2})(\d{2})/);
                        const timeStr = timeMatch ? `${timeMatch[1]}:${timeMatch[2]}` : '';

                        return `
                            <div class="notification-item" data-photo-path="${relativePath}">
                                <div class="notification-info">
                                    <span class="notification-time">${timeStr}</span>
                                    <span class="notification-name">未识别</span>
                                </div>
                                <img src="${photoUrl}" class="notification-img" alt="照片" onclick="viewImage('${photoUrl}', event)">

                                <!-- Edit Controls -->
                                <div class="edit-controls">
                                    <select class="cat-select" id="notify-cat-${photo.filename}">
                                        <option value="">选择</option>
                                        <option value="小巫">小巫</option>
                                        <option value="猪猪">猪猪</option>
                                        <option value="汪三">汪三</option>
                                        <option value="猪妞">猪妞</option>
                                    </select>
                                    <button class="confirm-btn" onclick="manualAddRecord('${relativePath}', event)">确认</button>
                                </div>

                                <!-- Delete Button -->
                                <button class="delete-btn" onclick="deleteUnidentifiedPhoto('${relativePath}', event)">✕</button>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;

            // 渲染后应用当前显示状态
            setTimeout(() => updateNotificationItemsDisplay(), 0);
        }

        // Notification modal
        document.getElementById('notificationBtn').addEventListener('click', () => {
            document.getElementById('notificationModal').classList.add('active');
            unreadNotifications = false;
            updateNotificationBadge();
        });

        document.getElementById('modalClose').addEventListener('click', () => {
            document.getElementById('notificationModal').classList.remove('active');
        });

        document.getElementById('notificationModal').addEventListener('click', (e) => {
            if (e.target.id === 'notificationModal') {
                document.getElementById('notificationModal').classList.remove('active');
            }
        });

        // ==================== Polling ====================
        setInterval(() => {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => updateStatus(data.running))
                .catch(err => console.error('Failed to fetch status:', err));
        }, 5000);

        setInterval(loadRecords, 30000);
        setInterval(loadNotifications, 30000);

        // ==================== Initialize ====================
        connectSocket();
        loadRecords();
        loadNotifications();
        fetch('/api/status')
            .then(r => r.json())
            .then(data => updateStatus(data.running));
    </script>
</body>
</html>
