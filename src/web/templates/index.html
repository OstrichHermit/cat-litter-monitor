<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫厕所监控系统</title>
    <link rel="stylesheet" href="/static/css/desktop.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-title">
                <h1>🐱 猫厕所监控系统</h1>
                <p>实时监控与智能统计</p>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <div id="notificationIcon" class="notification-icon" onclick="openNotifications()">
                    🔔 新纪录
                    <span id="notificationBadge" class="notification-badge hidden">0</span>
                </div>
                <button id="restartBtn" class="btn-restart">🔄 重启服务</button>
                <button id="stopBtn" class="btn-stop">🛑 停止服务</button>
            </div>
        </header>

        <!-- Notification Modal -->
        <div id="notificationModal" class="notification-modal">
            <div class="notification-panel">
                <div class="notification-header">
                    <h3>📋 未处理记录</h3>
                    <div class="toggles-container">
                        <div class="edit-toggle-container">
                            <span class="edit-toggle-label">✏️</span>
                            <div class="edit-switch" id="notificationEditToggle" onclick="toggleEditMode('notification')"></div>
                        </div>
                        <div class="delete-toggle-container">
                            <span class="delete-toggle-label">🗑️</span>
                            <div class="delete-switch" id="notificationDeleteToggle" onclick="toggleDeleteMode('notification')"></div>
                        </div>
                    </div>
                    <button class="notification-close" onclick="closeNotifications()">✕</button>
                </div>
                <div class="notification-content" id="notificationContent">
                    <div class="notification-empty">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                        <p>🎉 所有照片都已识别完毕</p>
                    </div>
                </div>
            </div>
        </div>

        <main class="main">
            <div class="video-card">
                <div class="card-header">📹 实时监控</div>
                <div class="video-wrapper">
                    <img src="/video_feed" class="video-feed" alt="监控画面">
                </div>
            </div>

            <aside class="sidebar">
                <div class="status-card">
                    <div id="status" class="status-indicator">检查中...</div>
                </div>

                <section class="records-section today">
                    <div class="card-header">
                        <span>📅 今日记录</span>
                        <div class="toggles-container">
                            <div class="edit-toggle-container">
                                <span class="edit-toggle-label">✏️</span>
                                <div class="edit-switch" id="todayEditToggle" onclick="toggleEditMode('today')"></div>
                            </div>
                            <div class="delete-toggle-container">
                                <span class="delete-toggle-label">🗑️</span>
                                <div class="delete-switch" id="todayDeleteToggle" onclick="toggleDeleteMode('today')"></div>
                            </div>
                        </div>
                    </div>
                    <div class="records-content">
                        <div class="stats-grid">
                            <div class="stat-item">
                                <div class="stat-name">小巫</div>
                                <div class="stat-value" id="today-小巫">0</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-name">猪猪</div>
                                <div class="stat-value" id="today-猪猪">0</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-name">汪三</div>
                                <div class="stat-value" id="today-汪三">0</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-name">猪妞</div>
                                <div class="stat-value" id="today-猪妞">0</div>
                            </div>
                        </div>
                        <div class="records-list" id="todayRecords">
                            <div class="empty-state">📭 今日暂无记录</div>
                        </div>
                    </div>
                </section>

                <section class="records-section yesterday">
                    <div class="card-header">
                        <span>📆 昨日记录</span>
                        <div class="toggles-container">
                            <div class="edit-toggle-container">
                                <span class="edit-toggle-label">✏️</span>
                                <div class="edit-switch" id="yesterdayEditToggle" onclick="toggleEditMode('yesterday')"></div>
                            </div>
                            <div class="delete-toggle-container">
                                <span class="delete-toggle-label">🗑️</span>
                                <div class="delete-switch" id="yesterdayDeleteToggle" onclick="toggleDeleteMode('yesterday')"></div>
                            </div>
                        </div>
                    </div>
                    <div class="records-content">
                        <div class="stats-grid">
                            <div class="stat-item">
                                <div class="stat-name">小巫</div>
                                <div class="stat-value" id="yesterday-小巫">0</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-name">猪猪</div>
                                <div class="stat-value" id="yesterday-猪猪">0</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-name">汪三</div>
                                <div class="stat-value" id="yesterday-汪三">0</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-name">猪妞</div>
                                <div class="stat-value" id="yesterday-猪妞">0</div>
                            </div>
                        </div>
                        <div class="records-list" id="yesterdayRecords">
                            <div class="empty-state">📭 昨日暂无记录</div>
                        </div>
                    </div>
                </section>
            </aside>
        </main>
    </div>

    <script src="/static/js/desktop.js"></script>
</body>
</html>
