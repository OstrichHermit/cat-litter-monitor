<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫厕所监控系统</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --primary-light: #34495e;
            --success: #27ae60;
            --success-light: #2ecc71;
            --danger: #c0392b;
            --danger-light: #e74c3c;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-600: #6c757d;
            --gray-800: #343a40;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 4px 20px rgba(0,0,0,0.12);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: var(--gray-100);
            min-height: 100vh;
            line-height: 1.5;
        }

        .app {
            display: grid;
            grid-template-rows: auto 1fr;
            min-height: 100vh;
            max-width: 1800px;
            margin: 0 auto;
            padding: 16px;
            gap: 16px;
        }

        /* Header */
        .header {
            background: var(--primary);
            color: white;
            padding: 20px 28px;
            border-radius: var(--radius);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
        }

        .header-title h1 {
            font-size: 26px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-title p {
            font-size: 14px;
            opacity: 0.85;
            margin-top: 4px;
        }

        .btn-stop {
            background: var(--danger);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(192, 57, 43, 0.3);
        }

        .btn-stop:hover:not(:disabled) {
            background: var(--danger-light);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(192, 57, 43, 0.4);
        }

        .btn-stop:disabled {
            background: var(--gray-600);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Main Layout */
        .main {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 16px;
            align-items: start;
            min-height: 0;
        }

        /* Video Section */
        .video-card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--gray-200);
            font-size: 18px;
            font-weight: 600;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .video-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .video-feed {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }

        /* Status Card */
        .status-card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .status-indicator {
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator.running {
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            color: #155724;
        }

        .status-indicator.stopped {
            background: linear-gradient(135deg, #f8d7da, #f5c6cb);
            color: #721c24;
        }

        /* Records Section */
        .records-section {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .records-section.today .card-header {
            background: linear-gradient(135deg, var(--success), var(--success-light));
            color: white;
            border-bottom: none;
        }

        .records-section.yesterday .card-header {
            background: linear-gradient(135deg, var(--gray-600), var(--gray-800));
            color: white;
            border-bottom: none;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--gray-200);
            border-bottom: 1px solid var(--gray-200);
        }

        .stat-item {
            background: white;
            padding: 14px 8px;
            text-align: center;
        }

        .stat-name {
            font-size: 13px;
            color: var(--gray-600);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--success);
        }

        /* Records List */
        .records-list {
            max-height: 280px;
            overflow-y: auto;
        }

        .record {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--gray-200);
            transition: background 0.15s;
        }

        .record:last-child {
            border-bottom: none;
        }

        .record:hover {
            background: var(--gray-100);
        }

        .record-time {
            font-family: "SF Mono", "Monaco", "Consolas", monospace;
            font-size: 13px;
            color: var(--gray-600);
            min-width: 65px;
        }

        .record-cat {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            color: var(--primary);
        }

        .record-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s;
            background: var(--gray-200);
        }

        .record-img:hover {
            transform: scale(1.1);
        }

        .empty-state {
            padding: 32px;
            text-align: center;
            color: var(--gray-600);
            font-size: 14px;
        }

        /* Scrollbar */
        .sidebar::-webkit-scrollbar,
        .records-list::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track,
        .records-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb,
        .records-list::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 3px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover,
        .records-list::-webkit-scrollbar-thumb:hover {
            background: var(--gray-600);
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .main {
                grid-template-columns: 1fr;
            }

            .sidebar {
                max-height: 500px;
            }
        }

        @media (max-width: 600px) {
            .app {
                padding: 12px;
                gap: 12px;
            }

            .header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
                padding: 20px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .btn-stop {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-title">
                <h1>🐱 猫厕所监控系统</h1>
                <p>实时监控与智能统计</p>
            </div>
            <button id="stopBtn" class="btn-stop">⏹ 停止服务</button>
        </header>

        <main class="main">
            <div class="video-card">
                <div class="card-header">📹 实时监控</div>
                <div class="video-wrapper">
                    <img src="/video_feed" class="video-feed" alt="监控画面">
                </div>
            </div>

            <aside class="sidebar">
                <div class="status-card">
                    <div id="status" class="status-indicator">检查中...</div>
                </div>

                <section class="records-section today">
                    <div class="card-header">📅 今日记录</div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-name">小巫</div>
                            <div class="stat-value" id="today-小巫">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-name">猪猪</div>
                            <div class="stat-value" id="today-猪猪">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-name">汪三</div>
                            <div class="stat-value" id="today-汪三">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-name">猪妞</div>
                            <div class="stat-value" id="today-猪妞">0</div>
                        </div>
                    </div>
                    <div class="records-list" id="todayRecords">
                        <div class="empty-state">📭 今日暂无记录</div>
                    </div>
                </section>

                <section class="records-section yesterday">
                    <div class="card-header">📆 昨日记录</div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-name">小巫</div>
                            <div class="stat-value" id="yesterday-小巫">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-name">猪猪</div>
                            <div class="stat-value" id="yesterday-猪猪">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-name">汪三</div>
                            <div class="stat-value" id="yesterday-汪三">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-name">猪妞</div>
                            <div class="stat-value" id="yesterday-猪妞">0</div>
                        </div>
                    </div>
                    <div class="records-list" id="yesterdayRecords">
                        <div class="empty-state">📭 昨日暂无记录</div>
                    </div>
                </section>
            </aside>
        </main>
    </div>

    <script>
        const socket = io();
        let isRunning = true;

        socket.on('connect', () => console.log('Connected to server'));

        socket.on('status_update', (data) => {
            isRunning = data.running;
            updateStatus(data.running);
        });

        socket.on('records_update', () => loadRecords());

        function updateStatus(running) {
            const statusEl = document.getElementById('status');
            const stopBtn = document.getElementById('stopBtn');

            if (running) {
                statusEl.className = 'status-indicator running';
                statusEl.innerHTML = '✅ 系统运行中';
                stopBtn.disabled = false;
            } else {
                statusEl.className = 'status-indicator stopped';
                statusEl.innerHTML = '❌ 系统已停止';
                stopBtn.disabled = true;
            }
        }

        function updateRecords(containerId, statsPrefix, records) {
            const cats = ['小巫', '猪猪', '汪三', '猪妞'];
            const counts = Object.fromEntries(cats.map(c => [c, 0]));

            records.forEach(r => {
                if (r.cat_name in counts) counts[r.cat_name]++;
            });

            cats.forEach(cat => {
                const el = document.getElementById(`${statsPrefix}-${cat}`);
                if (el) el.textContent = counts[cat];
            });

            const container = document.getElementById(containerId);

            if (records.length === 0) {
                container.innerHTML = `<div class="empty-state">📭 ${containerId.includes('today') ? '今日' : '昨日'}暂无记录</div>`;
                return;
            }

            container.innerHTML = records.map(r => {
                const photoPath = r.photo_path.replace(/^photo\//, '');
                const photoUrl = `/static/photo/${photoPath}`;
                return `
                    <div class="record">
                        <span class="record-time">${r.record_time}</span>
                        <span class="record-cat">${r.cat_name}</span>
                        <img src="${photoUrl}" class="record-img"
                             onclick="window.open('${photoUrl}', '_blank')"
                             onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNTAiIGhlaWdodD0iNTAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjUwIiBoZWlnaHQ9IjUwIiBmaWxsPSIjZWVlIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtc2l6ZT0iMTIiIGZpbGw9IiM5OTkiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGRvbWluYW50LWJhc2VsaW5lPSJtaWRkbGUiPjwvdGV4dD48L3N2Zz4='"
                             alt="照片">
                    </div>
                `;
            }).join('');
        }

        function loadRecords() {
            fetch('/api/records/today')
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        updateRecords('todayRecords', 'today', data.today);
                        updateRecords('yesterdayRecords', 'yesterday', data.yesterday);
                    }
                })
                .catch(err => console.error('Failed to load records:', err));
        }

        document.getElementById('stopBtn').addEventListener('click', function() {
            if (!confirm('确定要停止系统服务吗？')) return;

            this.disabled = true;
            this.textContent = '⏳ 正在停止...';

            fetch('/api/stop', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'stopping') {
                        alert('系统正在停止，请稍候...');
                        setTimeout(() => window.location.reload(), 3000);
                    } else {
                        alert('停止失败: ' + data.message);
                        this.disabled = false;
                        this.textContent = '⏹ 停止服务';
                    }
                })
                .catch(err => {
                    alert('请求失败: ' + err);
                    this.disabled = false;
                    this.textContent = '⏹ 停止服务';
                });
        });

        // 定时轮询
        setInterval(() => {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => updateStatus(data.running));
        }, 5000);

        setInterval(loadRecords, 30000);

        // 初始加载
        loadRecords();
    </script>
</body>
</html>
