<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫厕所监控系统</title>
    <link rel="stylesheet" href="/static/css/desktop.css?v=16">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-title">
                <h1>🐱 猫厕所监控系统</h1>
                <p>实时监控与智能统计</p>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <button id="themeToggle" class="btn-theme" title="切换深色模式">🌙</button>
                <button id="monitorToggle" class="btn-monitor" onclick="toggleMonitorPanel()" title="服务监控">🖥️ 服务监控</button>
                <button id="notificationIcon" class="notification-icon" onclick="openNotifications()">
                    🔔 新纪录
                    <span id="notificationBadge" class="notification-badge hidden">0</span>
                </button>
                <button id="restartBtn" class="btn-restart">🔄 重启服务</button>
                <button id="stopBtn" class="btn-stop">🛑 停止服务</button>
            </div>
        </header>

        <!-- Service Monitor Panel -->
        <div id="monitorPanel" class="monitor-panel">
            <div class="monitor-panel-header">
                <div class="monitor-panel-title">🖥️ 服务监控</div>
                <button class="monitor-panel-close" onclick="toggleMonitorPanel()">✕</button>
            </div>
            <div class="monitor-content">
                <!-- Left: Component Status Sidebar -->
                <div class="monitor-sidebar">
                    <div class="monitor-sidebar-title">服务状态</div>
                    <div class="monitor-component-list">
                        <div class="monitor-component-item" data-service="web">
                            <div class="monitor-component-info">
                                <span class="monitor-component-name">Web</span>
                                <span class="monitor-component-pid" id="monitor-pid-web">--</span>
                            </div>
                            <div class="monitor-component-status">
                                <span class="monitor-status-dot" id="monitor-dot-web"></span>
                                <span class="monitor-status-text" id="monitor-status-web">检查中</span>
                            </div>
                        </div>
                        <div class="monitor-component-item" data-service="manager">
                            <div class="monitor-component-info">
                                <span class="monitor-component-name">Manager</span>
                                <span class="monitor-component-pid" id="monitor-pid-manager">--</span>
                            </div>
                            <div class="monitor-component-status">
                                <span class="monitor-status-dot" id="monitor-dot-manager"></span>
                                <span class="monitor-status-text" id="monitor-status-manager">检查中</span>
                            </div>
                        </div>
                        <div class="monitor-component-item" data-service="mcp">
                            <div class="monitor-component-info">
                                <span class="monitor-component-name">MCP</span>
                                <span class="monitor-component-pid" id="monitor-pid-mcp">--</span>
                            </div>
                            <div class="monitor-component-status">
                                <span class="monitor-status-dot" id="monitor-dot-mcp"></span>
                                <span class="monitor-status-text" id="monitor-status-mcp">检查中</span>
                            </div>
                        </div>
                        <div class="monitor-component-item" data-service="main">
                            <div class="monitor-component-info">
                                <span class="monitor-component-name">Main</span>
                                <span class="monitor-component-pid" id="monitor-pid-main">--</span>
                            </div>
                            <div class="monitor-component-status">
                                <span class="monitor-status-dot" id="monitor-dot-main"></span>
                                <span class="monitor-status-text" id="monitor-status-main">检查中</span>
                            </div>
                        </div>
                        <div class="monitor-component-item" data-service="go2rtc">
                            <div class="monitor-component-info">
                                <span class="monitor-component-name">Go2rtc</span>
                                <span class="monitor-component-pid" id="monitor-pid-go2rtc">--</span>
                            </div>
                            <div class="monitor-component-status">
                                <span class="monitor-status-dot" id="monitor-dot-go2rtc"></span>
                                <span class="monitor-status-text" id="monitor-status-go2rtc">检查中</span>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Right: Log Panels -->
                <div class="monitor-log-area">
                    <div class="monitor-log-grid">
                        <div class="monitor-log-panel" data-service="manager">
                            <div class="monitor-log-header">
                                <span class="monitor-status-dot" id="monitor-log-dot-manager"></span>
                                <span class="monitor-log-title">Manager</span>
                                <div class="monitor-log-actions">
                                    <button class="monitor-log-btn" onclick="clearMonitorLog('manager')">清空</button>
                                    <button class="monitor-log-btn" onclick="scrollMonitorToBottom('manager')">底部</button>
                                </div>
                            </div>
                            <div class="monitor-log-content" id="monitor-log-manager"></div>
                        </div>
                        <div class="monitor-log-panel" data-service="mcp">
                            <div class="monitor-log-header">
                                <span class="monitor-status-dot" id="monitor-log-dot-mcp"></span>
                                <span class="monitor-log-title">MCP</span>
                                <div class="monitor-log-actions">
                                    <button class="monitor-log-btn" onclick="clearMonitorLog('mcp')">清空</button>
                                    <button class="monitor-log-btn" onclick="scrollMonitorToBottom('mcp')">底部</button>
                                </div>
                            </div>
                            <div class="monitor-log-content" id="monitor-log-mcp"></div>
                        </div>
                        <div class="monitor-log-panel" data-service="main">
                            <div class="monitor-log-header">
                                <span class="monitor-status-dot" id="monitor-log-dot-main"></span>
                                <span class="monitor-log-title">Main</span>
                                <div class="monitor-log-actions">
                                    <button class="monitor-log-btn" onclick="clearMonitorLog('main')">清空</button>
                                    <button class="monitor-log-btn" onclick="scrollMonitorToBottom('main')">底部</button>
                                </div>
                            </div>
                            <div class="monitor-log-content" id="monitor-log-main"></div>
                        </div>
                        <div class="monitor-log-panel" data-service="go2rtc">
                            <div class="monitor-log-header">
                                <span class="monitor-status-dot" id="monitor-log-dot-go2rtc"></span>
                                <span class="monitor-log-title">Go2rtc</span>
                                <div class="monitor-log-actions">
                                    <button class="monitor-log-btn" onclick="clearMonitorLog('go2rtc')">清空</button>
                                    <button class="monitor-log-btn" onclick="scrollMonitorToBottom('go2rtc')">底部</button>
                                </div>
                            </div>
                            <div class="monitor-log-content" id="monitor-log-go2rtc"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Notification Modal -->
        <div id="notificationModal" class="notification-modal">
            <div class="notification-panel">
                <div class="notification-header">
                    <h3>📋 未处理记录</h3>
                    <div class="toggles-container">
                        <div class="edit-toggle-container">
                            <span class="edit-toggle-label">✏️</span>
                            <div class="edit-switch" id="notificationEditToggle" onclick="toggleEditMode('notification')"></div>
                        </div>
                        <div class="delete-toggle-container">
                            <span class="delete-toggle-label">🗑️</span>
                            <div class="delete-switch" id="notificationDeleteToggle" onclick="toggleDeleteMode('notification')"></div>
                        </div>
                    </div>
                    <button class="notification-close" onclick="closeNotifications()">✕</button>
                </div>
                <div class="notification-content" id="notificationContent">
                    <div class="notification-empty">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                        <p>🎉 所有照片都已处理完毕</p>
                    </div>
                </div>
            </div>
        </div>

        <main class="main">
            <div class="video-card">
                <div class="card-header">
                    <span>📹 实时监控</span>
                    <div class="frame-push-toggle-container">
                        <span class="frame-push-label">画面</span>
                        <div class="frame-push-switch edit-switch active" id="framePushToggle" onclick="toggleFramePush()"></div>
                    </div>
                </div>
                <div class="video-wrapper">
                    <img src="/video_feed" class="video-feed" alt="监控画面" id="videoFeed">
                    <div class="video-placeholder hidden" id="videoPlaceholder">📷 画面推送已暂停</div>
                </div>
            </div>

            <aside class="sidebar">
                <div class="status-card">
                    <div id="status" class="status-indicator">检查中...</div>
                </div>

                <section class="records-section today">
                    <div class="card-header">
                        <span>📅 今日记录</span>
                        <div class="toggles-container">
                            <div class="edit-toggle-container">
                                <span class="edit-toggle-label">✏️</span>
                                <div class="edit-switch" id="todayEditToggle" onclick="toggleEditMode('today')"></div>
                            </div>
                            <div class="delete-toggle-container">
                                <span class="delete-toggle-label">🗑️</span>
                                <div class="delete-switch" id="todayDeleteToggle" onclick="toggleDeleteMode('today')"></div>
                            </div>
                        </div>
                    </div>
                    <div class="records-content">
                        <div class="stats-grid">
                            <div class="stat-item">
                                <div class="stat-name">小巫</div>
                                <div class="stat-value" id="today-小巫">0</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-name">猪猪</div>
                                <div class="stat-value" id="today-猪猪">0</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-name">汪三</div>
                                <div class="stat-value" id="today-汪三">0</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-name">猪妞</div>
                                <div class="stat-value" id="today-猪妞">0</div>
                            </div>
                        </div>
                        <div class="records-list" id="todayRecords">
                            <div class="empty-state">📭 今日暂无记录</div>
                        </div>
                    </div>
                </section>

                <section class="records-section yesterday">
                    <div class="card-header">
                        <span>📆 昨日记录</span>
                        <div class="toggles-container">
                            <div class="edit-toggle-container">
                                <span class="edit-toggle-label">✏️</span>
                                <div class="edit-switch" id="yesterdayEditToggle" onclick="toggleEditMode('yesterday')"></div>
                            </div>
                            <div class="delete-toggle-container">
                                <span class="delete-toggle-label">🗑️</span>
                                <div class="delete-switch" id="yesterdayDeleteToggle" onclick="toggleDeleteMode('yesterday')"></div>
                            </div>
                        </div>
                    </div>
                    <div class="records-content">
                        <div class="stats-grid">
                            <div class="stat-item">
                                <div class="stat-name">小巫</div>
                                <div class="stat-value" id="yesterday-小巫">0</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-name">猪猪</div>
                                <div class="stat-value" id="yesterday-猪猪">0</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-name">汪三</div>
                                <div class="stat-value" id="yesterday-汪三">0</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-name">猪妞</div>
                                <div class="stat-value" id="yesterday-猪妞">0</div>
                            </div>
                        </div>
                        <div class="records-list" id="yesterdayRecords">
                            <div class="empty-state">📭 昨日暂无记录</div>
                        </div>
                    </div>
                </section>
            </aside>
        </main>

        <!-- Photo Lightbox -->
        <div id="photoLightbox" class="lightbox-overlay" onclick="closeLightbox()">
            <div class="lightbox-content">
                <button class="lightbox-close" onclick="closeLightbox()">✕</button>
                <img id="lightboxImg" class="lightbox-img" src="" alt="照片">
            </div>
        </div>
    </div>

    <script src="/static/js/desktop.js?v=9"></script>
</body>
</html>
